name: classshare
description: "Projeto acadêmico para organizar e compartilhar fotos por sala/disciplina."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Banco de dados local (Android)
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Seleção de imagens da galeria
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
